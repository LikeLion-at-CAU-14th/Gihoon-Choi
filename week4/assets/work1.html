<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>회원가입</title>

    <link rel="stylesheet" href="./work2.css">
</head>
<body>

<main class="container">
    <section class="signup">

        <div class="header">
            <img src="./logo.png" class="logo">
            <h1>회원 가입을 위해 정보를 입력해주세요</h1>
        </div>

        <form class="form">

            <div class="input-box">
                <label>* 이메일</label>
                <input type="email">
            </div>

            <div class="input-box">
                <label>* 이름</label>
                <input type="text">
            </div>

            <div class="input-box">
                <label>* 비밀번호</label>
                <input type="password">
            </div>

            <div class="input-box">
                <label>* 비밀번호 확인</label>
                <input type="password">
            </div>

            <div class="gender">
                <label><input type="radio" name="gender"> 여성</label>
                <label><input type="radio" name="gender"> 남성</label>
            </div>

            <div class="agree">
                <label>
                    <input type="checkbox">
                    이용약관 개인정보 수집 및 이용, 마케팅 활용 선택에 모두 동의합니다.
                </label>
            </div>

            <div class="line"></div>

            <button class="btn">가입하기</button>

        </form>
    </section>
</main>
</body>
</html>
